<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon.png" />
    <meta name="theme-color" content="#04121D" />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Poppins Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- GLOBAL FONT STYLE -->
    <style>
      html,
      body,
      #root {
        font-family: "Poppins", sans-serif;
        margin: 0;
        padding: 0;
      }
    </style>

    <!-- TITLE -->
    <title>Dali Data Portal | Trusted Data Marketplace</title>

    <!-- DESCRIPTION -->
    <meta
      name="description"
      content="Dali Data Portal is a trusted data marketplace providing geospatial datasets, satellite imagery, environmental data, and analytics for research, planning, and decision-making."
    />

    <!-- KEYWORDS -->
    <meta
      name="keywords"
      content="Dali Data Portal, data marketplace, geospatial data, satellite imagery, GIS data, spatial data platform, Tanzania data portal"
    />

    <!-- Canonical -->
    <link rel="canonical" href="https://daliportal.com/" />

    <!-- Open Graph -->
    <meta property="og:title" content="Dali Data Portal" />
    <meta
      property="og:description"
      content="Trusted data marketplace for geospatial and analytics data."
    />
    <meta property="og:image" content="https://daliportal.com/icon.png" />
    <meta property="og:url" content="https://daliportal.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Dali Data Portal" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org/",
        "@type": "Organization",
        "name": "Dali Data Portal",
        "url": "https://daliportal.com/",
        "logo": "https://daliportal.com/icon.png",
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+255767335721",
          "contactType": "customer support",
          "areaServed": "TZ",
          "availableLanguage": ["English", "Swahili"]
        },
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Dar es Salaam",
          "addressCountry": "TZ"
        },
        "email": ["support@daliportal.com"]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
